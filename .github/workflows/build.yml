name: Build

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # Set Current Date As Env Variable
      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Prepare Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > sign
            chmod 600 sign
          fi

      # Build project and assemble APKs in a single Gradle invocation
      - name: Build project
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew build --configuration-cache --parallel --build-cache

      - name: Resolve release APK path
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "RELEASE_APK_PATH=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_ENV
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            echo "RELEASE_APK_PATH=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_ENV
          else
            echo "Release APK not found" >&2
            exit 1
          fi

      - name: Verify Baseline Profile Packaging
        run: |
          test -f app/src/main/generated/baselineProfiles/baseline-prof.txt
          test -f app/build/intermediates/merged_art_profile/release/mergeReleaseArtProfile/baseline-prof.txt

      # Upload Artifact Build
      - name: Upload Debug Apk
        uses: actions/upload-artifact@v6
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Upload Artifact Build
      - name: Upload Release Apk
        uses: actions/upload-artifact@v6
        with:
          name: apk-release
          path: ${{ env.RELEASE_APK_PATH }}

      # Create pre-release on push to main
      - name: Create Pre-Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.date_today }}-${{ github.run_number }}
          name: Build ${{ env.date_today }} (#${{ github.run_number }})
          prerelease: true
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            ${{ env.RELEASE_APK_PATH }}
